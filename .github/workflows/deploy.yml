name: Infrastructure Deployment

on:
  # Triggered by service repositories
  repository_dispatch:
    types: [deploy-backend, deploy-ml-service, deploy-pipeline]

  # Manual trigger
  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy"
        required: true
        type: choice
        options:
          - all
          - backend
          - ml-service
          - data-pipeline
      environment:
        description: "Environment"
        required: true
        type: choice
        options:
          - development
          - production

  # Auto-deploy on infrastructure changes
  push:
    branches: [main]
    paths:
      - "compose/**"
      - "scripts/**"

env:
  COMPOSE_FILE_DEV: infrastructure/compose/docker-compose.dev.yml
  COMPOSE_FILE_PROD: infrastructure/compose/docker-compose.prod.yml

jobs:
  # Determine what to deploy
  prepare:
    name: Prepare Deployment
    runs-on: ubuntu-latest
    outputs:
      service: ${{ steps.determine.outputs.service }}
      environment: ${{ steps.determine.outputs.environment }}
      deploy-backend: ${{ steps.determine.outputs.deploy-backend }}
      deploy-ml: ${{ steps.determine.outputs.deploy-ml }}
      deploy-pipeline: ${{ steps.determine.outputs.deploy-pipeline }}

    steps:
      - name: Determine deployment scope
        id: determine
        run: |
          # From repository_dispatch
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            EVENT_TYPE="${{ github.event.action }}"
            
            if [[ "$EVENT_TYPE" == "deploy-backend" ]]; then
              echo "service=backend" >> $GITHUB_OUTPUT
              echo "deploy-backend=true" >> $GITHUB_OUTPUT
              BRANCH="${{ github.event.client_payload.branch }}"
            elif [[ "$EVENT_TYPE" == "deploy-ml-service" ]]; then
              echo "service=ml-service" >> $GITHUB_OUTPUT
              echo "deploy-ml=true" >> $GITHUB_OUTPUT
              BRANCH="${{ github.event.client_payload.branch }}"
            elif [[ "$EVENT_TYPE" == "deploy-pipeline" ]]; then
              echo "service=data-pipeline" >> $GITHUB_OUTPUT
              echo "deploy-pipeline=true" >> $GITHUB_OUTPUT
              BRANCH="${{ github.event.client_payload.branch }}"
            fi
            
            # Determine environment from branch
            if [ "$BRANCH" == "main" ]; then
              echo "environment=production" >> $GITHUB_OUTPUT
            else
              echo "environment=development" >> $GITHUB_OUTPUT
            fi

          # From workflow_dispatch
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            SERVICE="${{ inputs.service }}"
            echo "service=$SERVICE" >> $GITHUB_OUTPUT
            echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT
            
            if [ "$SERVICE" == "all" ] || [ "$SERVICE" == "backend" ]; then
              echo "deploy-backend=true" >> $GITHUB_OUTPUT
            fi
            if [ "$SERVICE" == "all" ] || [ "$SERVICE" == "ml-service" ]; then
              echo "deploy-ml=true" >> $GITHUB_OUTPUT
            fi
            if [ "$SERVICE" == "all" ] || [ "$SERVICE" == "data-pipeline" ]; then
              echo "deploy-pipeline=true" >> $GITHUB_OUTPUT
            fi

          # From push (deploy all)
          else
            echo "service=all" >> $GITHUB_OUTPUT
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "deploy-backend=true" >> $GITHUB_OUTPUT
            echo "deploy-ml=true" >> $GITHUB_OUTPUT
            echo "deploy-pipeline=true" >> $GITHUB_OUTPUT
          fi

      - name: Deployment info
        run: |
          echo "🚀 Deployment Configuration"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Service: ${{ steps.determine.outputs.service }}"
          echo "Environment: ${{ steps.determine.outputs.environment }}"
          echo "Backend: ${{ steps.determine.outputs.deploy-backend }}"
          echo "ML Service: ${{ steps.determine.outputs.deploy-ml }}"
          echo "Pipeline: ${{ steps.determine.outputs.deploy-pipeline }}"

  # Deploy to Development
  deploy-dev:
    name: Deploy to Development
    needs: prepare
    if: needs.prepare.outputs.environment == 'development'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout infrastructure repo
        uses: actions/checkout@v4

      - name: Deploy to Development Server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEV_SERVER_HOST }}
          username: ${{ secrets.DEV_SERVER_USER }}
          key: ${{ secrets.DEV_SERVER_SSH_KEY }}
          port: 22
          command_timeout: 60m
          script: |
            cd /opt/travion
            COMPOSE_FILE="compose/docker-compose.dev.yml"

            # Pull latest infrastructure config
            git pull origin main

            # Login to GHCR with PAT for private packages
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Ensure environment files exist
            if [ ! -f .env ]; then
              cp .env.example .env
              echo "⚠️  Created .env from example - please configure it!"
            fi
            if [ ! -f .env.backend ]; then
              cp .env.backend.example .env.backend
              echo "⚠️  Created .env.backend from example"
            fi
            if [ ! -f .env.mlservice ]; then
              cp .env.mlservice.example .env.mlservice
              echo "⚠️  Created .env.mlservice from example"
            fi

            # Update ML image tags if provided by ml-services dispatch payload
            upsert_env_var() {
              local key="$1"
              local val="$2"
              local file="$3"
              if [ -z "$val" ]; then
                return 0
              fi

              if grep -q "^${key}=" "$file"; then
                sed -i "s|^${key}=.*|${key}=${val}|" "$file"
              else
                echo "${key}=${val}" >> "$file"
              fi
            }

            if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
              upsert_env_var "AI_AGENT_ENGINE_IMAGE" "${{ github.event.client_payload.ai_agent_engine_image }}" ".env.mlservice"
              upsert_env_var "MCP_GOOGLE_MAPS_IMAGE" "${{ github.event.client_payload.mcp_google_maps_image }}" ".env.mlservice"
              upsert_env_var "SAFETY_SERVICE_IMAGE" "${{ github.event.client_payload.safety_service_image }}" ".env.mlservice"
              upsert_env_var "TRANSPORT_SERVICE_IMAGE" "${{ github.event.client_payload.transport_service_image }}" ".env.mlservice"
              upsert_env_var "WEATHER_SERVICE_IMAGE" "${{ github.event.client_payload.weather_service_image }}" ".env.mlservice"
            fi

            # Determine which services to deploy
            SERVICES=""
            if [ "${{ needs.prepare.outputs.deploy-backend }}" == "true" ]; then
              SERVICES="$SERVICES backend"
            fi

            if [ "${{ needs.prepare.outputs.deploy-ml }}" == "true" ]; then
              AVAILABLE_SERVICES="$(docker compose -f "$COMPOSE_FILE" config --services)"
              add_if_exists() {
                local svc="$1"
                if echo "$AVAILABLE_SERVICES" | grep -qx "$svc"; then
                  SERVICES="$SERVICES $svc"
                fi
              }

              add_if_exists "ai-agent-engine"
              add_if_exists "mcp-google-maps"
              add_if_exists "safety-service"
              add_if_exists "transport-service"
              add_if_exists "weather-service"

            fi

            # Pull and restart services
            if [ -n "$SERVICES" ]; then
              docker compose -f "$COMPOSE_FILE" pull $SERVICES
              docker compose -f "$COMPOSE_FILE" up -d $SERVICES
              
              # Show logs
              for SERVICE in $SERVICES; do
                echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                echo "📋 Logs for $SERVICE"
                echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                docker compose -f "$COMPOSE_FILE" logs --tail=30 $SERVICE
              done
            else
              # Deploy all services
              docker compose -f "$COMPOSE_FILE" pull
              docker compose -f "$COMPOSE_FILE" up -d
            fi

            # Cleanup
            docker image prune -f

      - name: Deployment complete
        run: |
          echo "✅ Development deployment complete"
          echo "🌐 Service: ${{ needs.prepare.outputs.service }}"

  # Deploy to Production
  deploy-prod:
    name: Deploy to Production
    needs: prepare
    if: needs.prepare.outputs.environment == 'production'
    runs-on: ubuntu-latest
    # environment:
    #   name: production
    #   url: https://api.travion.com
    # Uncomment after creating production environment

    steps:
      - name: Checkout infrastructure repo
        uses: actions/checkout@v4

      - name: Create backup before deployment
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SERVER_SSH_KEY }}
          port: 22
          command_timeout: 25m
          script: |
            cd /opt/travion
            bash scripts/backup.sh
            echo "✅ Backup created"

      - name: Deploy to Production Server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SERVER_SSH_KEY }}
          port: 22
          command_timeout: 90m
          script: |
            cd /opt/travion
            COMPOSE_FILE="compose/docker-compose.prod.yml"

            # Pull latest infrastructure config
            git pull origin main

            # Login to GHCR with PAT for private packages
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Ensure environment files exist
            if [ ! -f .env ]; then
              cp .env.example .env
              echo "⚠️  Created .env from example - please configure it!"
            fi
            if [ ! -f .env.backend ]; then
              cp .env.backend.example .env.backend
              echo "⚠️  Created .env.backend from example"
            fi
            if [ ! -f .env.mlservice ]; then
              cp .env.mlservice.example .env.mlservice
              echo "⚠️  Created .env.mlservice from example"
            fi

            # Update ML image tags if provided by ml-services dispatch payload
            upsert_env_var() {
              local key="$1"
              local val="$2"
              local file="$3"
              if [ -z "$val" ]; then
                return 0
              fi

              if grep -q "^${key}=" "$file"; then
                sed -i "s|^${key}=.*|${key}=${val}|" "$file"
              else
                echo "${key}=${val}" >> "$file"
              fi
            }

            if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
              upsert_env_var "AI_AGENT_ENGINE_IMAGE" "${{ github.event.client_payload.ai_agent_engine_image }}" ".env.mlservice"
              upsert_env_var "MCP_GOOGLE_MAPS_IMAGE" "${{ github.event.client_payload.mcp_google_maps_image }}" ".env.mlservice"
              upsert_env_var "SAFETY_SERVICE_IMAGE" "${{ github.event.client_payload.safety_service_image }}" ".env.mlservice"
              upsert_env_var "TRANSPORT_SERVICE_IMAGE" "${{ github.event.client_payload.transport_service_image }}" ".env.mlservice"
              upsert_env_var "WEATHER_SERVICE_IMAGE" "${{ github.event.client_payload.weather_service_image }}" ".env.mlservice"
            fi

            # Update Infisical credentials if provided (from repository_dispatch)
            if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
              if [ -n "${{ github.event.client_payload.infisical.client_id }}" ]; then
                echo "🔐 Updating Infisical credentials in .env.backend..."
                sed -i "s|^INFISICAL_CLIENT_ID=.*|INFISICAL_CLIENT_ID=${{ github.event.client_payload.infisical.client_id }}|" .env.backend
                sed -i "s|^INFISICAL_CLIENT_SECRET=.*|INFISICAL_CLIENT_SECRET=${{ github.event.client_payload.infisical.client_secret }}|" .env.backend
                sed -i "s|^INFISICAL_PROJECT_ID=.*|INFISICAL_PROJECT_ID=${{ github.event.client_payload.infisical.project_id }}|" .env.backend
                sed -i "s|^INFISICAL_ENVIRONMENT=.*|INFISICAL_ENVIRONMENT=${{ github.event.client_payload.infisical.environment }}|" .env.backend
                echo "✅ Infisical credentials updated"
              fi
            fi

            # Determine which services to deploy
            SERVICES=""
            if [ "${{ needs.prepare.outputs.deploy-backend }}" == "true" ]; then
              SERVICES="$SERVICES backend"
            fi
            if [ "${{ needs.prepare.outputs.deploy-ml }}" == "true" ]; then
              AVAILABLE_SERVICES="$(docker compose -f "$COMPOSE_FILE" config --services)"
              add_if_exists() {
                local svc="$1"
                if echo "$AVAILABLE_SERVICES" | grep -qx "$svc"; then
                  SERVICES="$SERVICES $svc"
                fi
              }

              add_if_exists "ai-agent-engine"
              add_if_exists "mcp-google-maps"
              add_if_exists "safety-service"
              add_if_exists "transport-service"
              add_if_exists "weather-service"

            fi

            # Pull and restart services (zero-downtime)
            if [ -n "$SERVICES" ]; then
              # Pull images with error handling for each service
              for SERVICE in $SERVICES; do
                echo "📦 Pulling $SERVICE..."
                if docker compose -f "$COMPOSE_FILE" pull $SERVICE 2>&1; then
                  echo "✅ $SERVICE image pulled successfully"
                else
                  echo "⚠️  $SERVICE image not available, skipping..."
                  SERVICES=$(echo "$SERVICES" | sed "s/$SERVICE//g")
                fi
              done
              
              # Deploy only successfully pulled services
              if [ -n "$SERVICES" ]; then
                docker compose -f "$COMPOSE_FILE" up -d $SERVICES
                
                # Wait for health checks
                sleep 15
                
                # Show logs
                for SERVICE in $SERVICES; do
                  echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                  echo "📋 Logs for $SERVICE"
                  echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                  docker compose -f "$COMPOSE_FILE" logs --tail=30 $SERVICE
                done
              else
                echo "⚠️  No services to deploy"
              fi
            else
              # Deploy all services
              docker compose -f "$COMPOSE_FILE" pull
              docker compose -f "$COMPOSE_FILE" up -d
            fi

            # Cleanup
            docker image prune -f

      - name: Health check
        run: |
          sleep 20
          echo "✅ Production deployment complete"
          echo "🌐 Service: ${{ needs.prepare.outputs.service }}"
          echo "⚠️  Verify health endpoints manually"

      - name: Notify success
        run: |
          echo "🎉 Deployment successful!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Service: ${{ needs.prepare.outputs.service }}"
          echo "Environment: production"
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            echo "Triggered by: ${{ github.event.client_payload.triggered_by }}"
            echo "From commit: ${{ github.event.client_payload.sha }}"
          fi

  # Rollback on failure
  rollback:
    name: Rollback on Failure
    needs: [prepare, deploy-prod]
    if: failure() && needs.prepare.outputs.environment == 'production'
    runs-on: ubuntu-latest

    steps:
      - name: Rollback deployment
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SERVER_SSH_KEY }}
          port: 22
          command_timeout: 20m
          script: |
            cd /opt/travion
            echo "⚠️  Deployment failed - initiating rollback"
            bash scripts/restore.sh
            docker compose -f compose/docker-compose.prod.yml up -d
            echo "✅ Rollback complete"

      - name: Notify failure
        run: |
          echo "❌ Deployment failed and rolled back"
          echo "Check logs and infrastructure configuration"
